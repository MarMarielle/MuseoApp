name: Java CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Ver contenido
      run: ls

    - name: Ver dentro de MuseoApp
      run: ls MuseoApp

    - name: Configurar Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Ejecutar pruebas
      run: cd MuseoApp && mvn clean test
